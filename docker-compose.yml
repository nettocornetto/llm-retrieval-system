version: "3.9"
services:
  api:
    build: .
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    depends_on:
      - redis

  worker:
    build: .
    env_file:
      - .env
    command: ["rq", "worker", "ingest", "--url", "redis://redis:6379/0"]
    volumes:
      - ./data:/app/data
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
